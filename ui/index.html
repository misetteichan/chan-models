<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>chan models</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside id="sidebar">
    <section class="pane">
      <label class="pane-label" for="model-select">モデル</label>
      <select id="model-select"></select>
      <p id="model-desc"></p>
    </section>

    <section class="pane">
      <label class="pane-label pane-toggle">
        <input type="checkbox" id="params-toggle">
        パラメータを調整する
      </label>
      <form id="params-form" hidden></form>
      <div class="btn-row" id="reset-row" hidden>
        <button type="button" id="btn-reset">初期値に戻す</button>
      </div>
    </section>

    <section class="pane">
      <div class="pane-label">パーツ</div>
      <ul id="parts-list"></ul>
    </section>

    <section class="pane" id="actions">
      <div class="btn-row">
        <button type="button" id="btn-fit">全体表示</button>
      </div>
      <div class="btn-row">
        <button type="button" id="btn-stl">STL 書き出し</button>
        <button type="button" id="btn-3mf">3MF 書き出し</button>
      </div>
    </section>

    <div id="status"></div>
  </aside>

  <main id="viewer">
    <div id="version"></div>
  </main>

  <script src="vendor/three.bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
