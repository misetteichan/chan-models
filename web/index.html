<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>chan models</title>
</head>
<body>
  <aside id="sidebar">
    <header id="app-header">
      <img id="app-icon" src="/favicon.png" alt="" width="26" height="26">
      <span id="app-name">chan models</span>
    </header>

    <section class="pane">
      <label class="pane-label" for="model-select">モデル</label>
      <select id="model-select"></select>
      <p id="model-desc"></p>
    </section>

    <section class="pane">
      <label class="pane-label pane-toggle">
        <input type="checkbox" id="params-toggle">
        パラメータを調整する
      </label>
      <form id="params-form" hidden></form>
      <div class="btn-row" id="reset-row" hidden>
        <button type="button" id="btn-reset">初期値に戻す</button>
      </div>
    </section>

    <section class="pane">
      <div class="pane-label">パーツ</div>
      <ul id="parts-list"></ul>
    </section>

    <section class="pane" id="actions">
      <div class="btn-row">
        <button type="button" id="btn-fit">全体表示</button>
      </div>
      <div class="btn-row">
        <button type="button" id="btn-stl">STL 書き出し</button>
        <button type="button" id="btn-3mf">3MF 書き出し</button>
      </div>
    </section>

    <div id="status"></div>
  </aside>

  <main id="viewer">
    <div id="viewer-footer">
      <a id="licenses-link" target="_blank" rel="noopener">ライセンス</a>
      <span id="version"></span>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
